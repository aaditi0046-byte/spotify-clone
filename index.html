<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Spotify - Your Favourite Music is Here</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav>
        <ul>
            <li class="brand">
                <img src="logo.png" alt="Spotify">
                Spotify
            </li>

            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>

    <!-- Main Container -->
    <div class="container">

        <div class="songList">

            <h1>Best of NCS - No Copyright Sounds</h1>

            <div class="songItemContainer">
                <!-- Song 1 -->
                <div class="songItem">
                    <img src="1.jpg" alt="1">
                    <span class="songName">Let Me Love You</span>

                    <span class="songlistplay">
                        <span class="timestamp">
                            05:34
                            <i id="0" class="far songItemPlay fa-play-circle"></i>
                        </span>
                    </span>
                </div>

                <!-- Song 2 -->
                <div class="songItem">
                    <img src="2.jpg" alt="2">
                    <span class="songName">Faded</span>

                    <span class="songlistplay">
                        <span class="timestamp">
                            04:20
                            <i id="1" class="far songItemPlay fa-play-circle"></i>
                        </span>
                    </span>
                </div>

                <!-- Song 3 -->
                <div class="songItem">
                    <img src="3.jpg" alt="3">
                    <span class="songName">On & On</span>

                    <span class="songlistplay">
                        <span class="timestamp">
                            03:45
                            <i id="2" class="far songItemPlay fa-play-circle"></i>
                        </span>
                    </span>
                </div>

                <!-- Song 4 -->
                <div class="songItem">
                    <img src="4.jpg" alt="4">
                    <span class="songName">Mortals</span>

                    <span class="songlistplay">
                        <span class="timestamp">
                            04:10
                            <i id="3" class="far songItemPlay fa-play-circle"></i>
                        </span>
                    </span>
                </div>

                <!-- Song 5 -->
                <div class="songItem">
                    <img src="5.jpg" alt="5">
                    <span class="songName">Unity</span>

                    <span class="songlistplay">
                        <span class="timestamp">
                            03:55
                            <i id="4" class="far songItemPlay fa-play-circle"></i>
                        </span>
                    </span>
                </div>

                <!-- Song 6 -->
                <div class="songItem">
                    <img src="6.jpg" alt="6">
                    <span class="songName">Invincible</span>

                    <span class="songlistplay">
                        <span class="timestamp">
                            04:05
                            <i id="5" class="far songItemPlay fa-play-circle"></i>
                        </span>
                    </span>
                </div>

                <!-- Song 7 -->
                <div class="songItem">
                    <img src="7.jpg" alt="7">
                    <span class="songName">Heroes Tonight</span>

                    <span class="songlistplay">
                        <span class="timestamp">
                            03:50
                            <i id="6" class="far songItemPlay fa-play-circle"></i>
                        </span>
                    </span>
                </div>

                <!-- Song 8 -->
                <div class="songItem">
                    <img src="8.jpg" alt="8">
                    <span class="songName">Blank</span>

                    <span class="songlistplay">
                        <span class="timestamp">
                            04:15
                            <i id="7" class="far songItemPlay fa-play-circle"></i>
                        </span>
                    </span>
                </div>

                <!-- Song 9 -->
                <div class="songItem">
                    <img src="9.jpg" alt="9">
                    <span class="songName">Sky High</span>

                    <span class="songlistplay">
                        <span class="timestamp">
                            03:40
                            <i id="8" class="far songItemPlay fa-play-circle"></i>
                        </span>
                    </span>
                </div>

                <!-- Song 10 -->
                <div class="songItem">
                    <img src="10.jpg" alt="10">
                    <span class="songName">Alone</span>

                    <span class="songlistplay">
                        <span class="timestamp">
                            04:30
                            <i id="9" class="far songItemPlay fa-play-circle"></i>
                        </span>
                    </span>
                </div>

            </div>

        </div>

        <div class="songBanner"></div>

    </div>

    <!-- Bottom Music Controls -->
    <div class="bottom">

        <input type="range" name="range" id="myProgressBar" min="0" value="0" max="100">

        <div class="icons">

            <i class="fas fa-3x fa-step-backward" id="previous"></i>

            <i class="far fa-3x fa-play-circle" id="masterPlay"></i>

            <i class="fas fa-3x fa-step-forward" id="next"></i>

        </div>

        <div class="songInfo">

            <img src="playing.gif" width="42" alt="playing" id="gif">

            <span id="masterSongName">
                Warriyo - Mortals [NCS Release]
            </span>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
